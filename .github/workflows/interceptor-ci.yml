name: interceptor-ci

on:
  push:
    paths:
      - 'interceptor/**'
      - '.github/workflows/interceptor-ci.yml'
  pull_request:
    paths:
      - 'interceptor/**'
      - '.github/workflows/interceptor-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interceptor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: interceptor/go.sum

      - name: Build
        run: make build

      - name: Test
        run: make test
